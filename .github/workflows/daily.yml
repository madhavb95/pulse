# The workflow name - appears in the GitHub Actions tab
name: Pulse - Daily Summary Bot

# When to run this workflow
on:
  # Scheduled run: 2:30 AM UTC = 8:00 AM IST
  schedule:
    - cron: '30 2 * * *'
  # Manual trigger: adds a "Run workflow" button to the Actions tab
  workflow_dispatch:

# The jobs this workflow runs
jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code onto the server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install the required libraries
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the bot
      - name: Run Pulse bot
        run: python bot.py

      # Step 5: Save the output file as a downloadable artifact
      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt
